version: "3.9"

services:
  # ---------------------------
  # FASTAPI BACKEND (API SERVER)
  # ---------------------------
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: vartapravah_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - IS_AI_WORKER=false
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - temporal
    volumes:
      - output_data:/app/output
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # ---------------------------
  # TEMPORAL WORKER
  # ---------------------------
  worker:
    build: .
    container_name: vartapravah_worker
    restart: always
    environment:
      - IS_AI_WORKER=true
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - temporal
    command: python -m backend.workflows.temporal_worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - output_data:/app/output

  # ---------------------------
  # WAV2LIP (AI FACE ENGINE)
  # ---------------------------
  wav2lip:
    build:
      context: .
      dockerfile: ai/wav2lip/Dockerfile
    container_name: vartapravah_wav2lip
    restart: always
    volumes:
      - output_data:/app/output
    command: tail -f /dev/null

  # ---------------------------
  # REDIS
  # ---------------------------
  redis:
    image: redis:7
    container_name: vartapravah_redis
    restart: always

  # ---------------------------
  # POSTGRES
  # ---------------------------
  postgres:
    image: postgres:15
    container_name: vartapravah_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vartapravah
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---------------------------
  # TEMPORAL (FIXED IMAGE)
  # ---------------------------
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: vartapravah_temporal
    restart: always
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: password
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"


# ---------------------------
# VOLUMES
# ---------------------------
volumes:
  postgres_data:
  output_data: