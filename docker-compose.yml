services:
  # --- PRIMARY NODE SERVICES (Hetzner) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vartapravah_backend
    profiles: ["primary"]
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./assets:/app/assets
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - temporal

  temporal_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vartapravah_temporal
    profiles: ["primary"]
    restart: always
    command: python workflows/temporal_worker.py
    env_file: .env
    volumes:
      - ./assets:/app/assets
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - temporal
      - postgres

  temporal:
    image: temporalio/auto-setup:latest
    container_name: vartapravah_temporal_server
    profiles: ["primary"]
    restart: always
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
      - "8233:8233"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: vartapravah_postgres
    profiles: ["primary"]
    restart: always
    environment:
      POSTGRES_DB: vartapravah
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vartapravah_redis
    profiles: ["primary"]
    restart: always
    ports:
      - "6379:6379"

  # --- RELAY NODE SERVICES (Oracle) ---
  streamer:
    build:
      context: ./streaming/nginx
      dockerfile: Dockerfile
    container_name: vartapravah_streamer
    profiles: ["relay"]
    restart: always
    env_file: .env
    environment:
      - HETZNER_NODE_URL=${HETZNER_NODE_URL}
      - YOUTUBE_STREAM_KEY=${YOUTUBE_STREAM_KEY}
    volumes:
      - ./logs:/app/logs
    ports:
      - "1935:1935"
      - "8080:8080"

volumes:
  postgres_data:
