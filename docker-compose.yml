version: "3.9"

services:
  # ---------------------------
  # FASTAPI BACKEND (API SERVER)
  # ---------------------------
  backend:
    build: .
    container_name: vartapravah_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - temporal
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # ---------------------------
  # TEMPORAL WORKER (FIXED PATH)
  # ---------------------------
  worker:
    build: .
    container_name: vartapravah_worker
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - temporal
    # ✅ BEST PRACTICE (module mode)
    command: python -m backend.workflows.temporal_worker

  # ---------------------------
  # REDIS
  # ---------------------------
  redis:
    image: redis:7
    container_name: vartapravah_redis
    restart: always

  # ---------------------------
  # POSTGRES
  # ---------------------------
  postgres:
    image: postgres:15
    container_name: vartapravah_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vartapravah
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---------------------------
  # TEMPORAL
  # ---------------------------
  temporal:
    image: temporal