# --- VARTA PRAVAH: PRIMARY NODE (Hetzner) ---
# Use: docker-compose up -d

services:
  # --- BACKEND & DASHBOARD ---
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vartapravah_backend
    restart: always
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "18000:8000"
    env_file: .env
    volumes:
      - ./assets:/app/assets
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - temporal

  # --- TEMPORAL WORKER (Workflow Orchestrator) ---
  temporal_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vartapravah_temporal
    restart: always
    command: python -m backend.workflows.temporal_worker
    env_file: .env
    volumes:
      - ./assets:/app/assets
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - temporal
      - postgres

  # --- TEMPORAL SERVER (Auto Setup) ---
  temporal:
    image: temporalio/auto-setup:latest
    container_name: vartapravah_temporal_server
    restart: always
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=vartapravah_postgres
    ports:
      - "7233:7233"
      - "18233:8233"
    depends_on:
      - postgres

  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:15
    container_name: vartapravah_postgres
    restart: always
    environment:
      POSTGRES_DB: vartapravah
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vartapravah_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
